name: Lidl stock monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run stock check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python check_stock.py

      - name: Persist state
        run: |
          git config user.name "stock-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.txt
          git diff --cached --quiet || git commit -m "update stock state"
          git push

